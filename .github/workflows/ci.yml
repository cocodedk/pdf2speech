name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['**']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        # kokoro/torch deliberately excluded: they pull in ~1GB of torch and
        # nothing under test exercises real TTS synthesis - the tests only
        # cover text parsing/extraction (narrate_book, pdf2speech,
        # make_audiobook), so the heavy synthesis engines aren't needed here.
        run: |
          pip install piper-tts pypdf pypdfium2 imageio-ffmpeg pillow soundfile pytest ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q
